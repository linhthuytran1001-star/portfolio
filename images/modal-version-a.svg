  <text x="318" y="238" font-size="12" fill="#555">✓  Everything in Basic</text>
  <text x="318" y="258" font-size="12" fill="#555">✓  AI Review Summary</text>
  <text x="318" y="278" font-size="12" fill="#555">✓  Smart review highlights</text>
  <text x="318" y="298" font-size="12" fill="#555">✓  Priority support</text>

