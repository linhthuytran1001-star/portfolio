  <circle cx="396" cy="318" r="4" fill="#22c55e"/><text x="408" y="322" font-size="13" fill="#374151">Total reviews/product: <tspan font-weight="700">Unlimited</tspan></text>
  <circle cx="396" cy="344" r="4" fill="#22c55e"/><text x="408" y="348" font-size="13" fill="#374151">Access all exclusive features</text>
  <circle cx="396" cy="370" r="4" fill="#22c55e"/><text x="408" y="374" font-size="13" fill="#374151">Priority support</text>
  <circle cx="396" cy="396" r="4" fill="#22c55e"/><text x="408" y="400" font-size="13" fill="#374151">Show photo and video reviews</text>
  <circle cx="396" cy="422" r="4" fill="#22c55e"/><text x="408" y="426" font-size="13" fill="#374151">Import reviews from AliExpress, Amazon...</text>
  <circle cx="396" cy="448" r="4" fill="#22c55e"/><text x="408" y="452" font-size="13" fill="#374151">Import reviews from a CSV file</text>

  <!-- Divider -->
