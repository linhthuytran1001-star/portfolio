  <text x="62" y="278" font-size="12" fill="#555">✓  Basic display widgets</text>
  <text x="62" y="298" font-size="12" fill="#aaa">✗  AI features</text>

  <!-- AI Features card (highlighted) -->
  <rect x="298" y="118" width="222" height="220" rx="10" fill="#fff8ec" stroke="#E8A020" stroke-width="2"/>
  <!-- Best Value badge -->
  <rect x="358" y="108" width="102" height="22" rx="11" fill="#E8A020"/>
  <text x="409" y="123" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">BEST VALUE</text>

  <text x="409" y="160" font-size="13" fill="#E8A020" text-anchor="middle" font-weight="600">AI Features Plan</text>
