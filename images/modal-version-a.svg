  <text x="522" y="193" font-size="11" font-weight="600" fill="#1d4ed8" text-anchor="middle">Limited offer!</text>

  <rect x="386" y="204" width="286" height="66" rx="8" fill="#f3f4f6"/>
  <text x="402" y="237" font-size="13" fill="#374151">$</text>
  <text x="413" y="241" font-size="30" font-weight="800" fill="#111827">1</text>
  <text x="453" y="228" font-size="12" fill="#9ca3af" text-decoration="line-through">$14.95</text>
  <text x="453" y="244" font-size="12" fill="#6b7280">for the first month</text>
  <text x="402" y="262" font-size="12" fill="#374151">Then <tspan font-weight="700">$14.95/month</tspan> after</text>

