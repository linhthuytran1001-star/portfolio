  <circle cx="58" cy="352" r="4" fill="#f97316"/><text x="70" y="356" font-size="13" fill="#374151">Basic support</text>
  <circle cx="58" cy="378" r="4" fill="#f97316"/><text x="70" y="382" font-size="13" fill="#374151">Show only text reviews</text>
  <circle cx="58" cy="404" r="4" fill="#f97316"/><text x="70" y="408" font-size="13" fill="#374151">Import reviews from AliExpress</text>

