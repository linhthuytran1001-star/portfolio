  <rect x="40" y="344" width="220" height="40" rx="8" fill="#f0f0f0"/>
  <text x="150" y="369" font-size="13" fill="#555" text-anchor="middle" font-weight="500">Keep Basic plan</text>

  <rect x="298" y="344" width="222" height="40" rx="8" fill="#E8A020"/>
  <text x="409" y="369" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Try AI features for free</text>
