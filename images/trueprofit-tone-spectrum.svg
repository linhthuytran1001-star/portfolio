<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="900" height="380" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Column headers -->
  <text x="450" y="28" font-size="10" font-weight="600" fill="#999" text-anchor="middle" letter-spacing="2">TONE SPECTRUM — INDIVIDUAL RANGES</text>
  <text x="50" y="28" font-size="10" fill="#aaa" text-anchor="start">1</text>
  <text x="198" y="28" font-size="10" fill="#aaa" text-anchor="middle">2</text>
  <text x="334" y="28" font-size="10" fill="#aaa" text-anchor="middle">3</text>
  <text x="466" y="28" font-size="10" fill="#aaa" text-anchor="middle">4</text>
  <text x="600" y="28" font-size="10" fill="#aaa" text-anchor="middle">5</text>
  <text x="740" y="28" font-size="10" fill="#aaa" text-anchor="middle">6</text>

  <!-- ROW 1: Clear ↔ Blunt -->
  <text x="100" y="72" font-size="13" font-weight="600" fill="#111" text-anchor="end">Clear</text>
  <line x1="110" y1="68" x2="780" y2="68" stroke="#d1d5db" stroke-width="3" stroke-linecap="round"/>
  <!-- dot at position ~1.5 -->
  <circle cx="155" cy="68" r="10" fill="#4caf86"/>
  <text x="800" y="72" font-size="13" font-weight="600" fill="#666" text-anchor="start">Blunt</text>

  <!-- ROW 2: Organized ↔ Flawless -->
  <text x="100" y="132" font-size="13" font-weight="600" fill="#111" text-anchor="end">Organized</text>
  <line x1="110" y1="128" x2="780" y2="128" stroke="#d1d5db" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="128" r="10" fill="#4caf86"/>
  <text x="800" y="132" font-size="13" font-weight="600" fill="#666" text-anchor="start">Flawless</text>

  <!-- ROW 3: Reliable ↔ Unquestionable -->
  <text x="100" y="192" font-size="13" font-weight="600" fill="#111" text-anchor="end">Reliable</text>
  <line x1="110" y1="188" x2="780" y2="188" stroke="#d1d5db" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="188" r="10" fill="#4caf86"/>
  <text x="800" y="192" font-size="13" font-weight="600" fill="#666" text-anchor="start">Unquestionable</text>

  <!-- ROW 4: Skilled ↔ Masterful -->
  <text x="100" y="252" font-size="13" font-weight="600" fill="#111" text-anchor="end">Skilled</text>
  <line x1="110" y1="248" x2="780" y2="248" stroke="#d1d5db" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="248" r="10" fill="#4caf86"/>
  <text x="800" y="252" font-size="13" font-weight="600" fill="#666" text-anchor="start">Masterful</text>

  <!-- ROW 5: Forward-Thinking ↔ Revolutionary -->
  <text x="100" y="312" font-size="13" font-weight="600" fill="#111" text-anchor="end">Forward-Thinking</text>
  <line x1="110" y1="308" x2="780" y2="308" stroke="#d1d5db" stroke-width="3" stroke-linecap="round"/>
  <circle cx="155" cy="308" r="10" fill="#4caf86"/>
  <text x="800" y="312" font-size="13" font-weight="600" fill="#666" text-anchor="start">Revolutionary</text>

  <!-- Legend -->
  <circle cx="820" cy="352" r="7" fill="#4caf86"/>
  <text x="832" y="356" font-size="10" fill="#666">Team consensus</text>
</svg>
